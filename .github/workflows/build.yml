name: Build plugin

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer

      - name: Install dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - name: Lint PHP
        run: |
          find . -name '*.php' -not -path './vendor/*' -print0 | xargs -0 -n1 php -l

      - name: Package plugin
        run: |
          mkdir -p build/descope-wp
          tar -cf - \
            --exclude=./.git \
            --exclude=./.github \
            --exclude=./.gitignore \
            --exclude=./build \
            --exclude=./renovate.json \
            --exclude='.DS_Store' \
            --exclude='._.DS_Store' \
            . | tar -xf - -C build/descope-wp
          cd build && zip -rq descope-wp.zip descope-wp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: descope-wp
          path: build/descope-wp.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/descope-wp.zip
